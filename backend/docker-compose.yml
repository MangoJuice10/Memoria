services:
  dev-db:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memoria
    networks:
      - memoria
  test-db:
    image: postgres:18
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memoria
    networks:
      - memoria
networks:
  memoria: